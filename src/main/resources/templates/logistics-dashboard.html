<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Logistics Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link th:href="@{/style.css}" rel="stylesheet">
</head>
<body>

<div class="sidebar">
  <h4 class="text-center mb-4">Logistics Panel</h4>

  <a href="/logistics-dashboard">Dashboard</a>
  <a href="/allocations">Approved Allocations</a>
  <a href="/allocations">Create Delivery Order</a>
  <a href="/deliveries?view=active">Update Delivery Status</a>
  <a href="/deliveries?view=track">Track Deliveries</a>
  <a href="/deliveries?view=history">Delivery History</a>
  <a href="/logout">Logout</a>
</div>

<div class="content">

  <h2 class="mb-4">Logistics Dashboard</h2>

  <div class="row g-4">

    <div class="col-md-6">
      <div class="card card-box p-4">
        <h5>Total Deliveries</h5>
        <h2 id="deliveryCount">0</h2>
      </div>
    </div>

    <div class="col-md-6">
      <div class="card card-box p-4">
        <h5>Total Allocations</h5>
        <h2 id="allocationCount">0</h2>
      </div>
    </div>

  </div>

</div>

<script>
  fetch('/api/deliveries')
  .then(res=>res.json())
  .then(data=>{
      document.getElementById("deliveryCount").innerText=data.length;
  });

  fetch('/api/allocations')
  .then(res=>res.json())
  .then(data=>{
      document.getElementById("allocationCount").innerText=data.length;
  });
</script>

</body>
</html>
