<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Users</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link th:href="@{/style.css}" rel="stylesheet">
</head>
<body>

<div class="sidebar">
  <h4 class="text-center mb-4">Admin Panel</h4>
  <a href="/admin-dashboard">Dashboard</a>
  <a href="/users" style="background-color: #007bff; color: white;">Users</a>
  <a href="/camp-page">Camps</a>
  <a href="/requests">Requests</a>
  <a href="/resources">Resources</a>
  <a href="/warehouses">Warehouses</a>
  <a href="/inventory">Inventory</a>
  <a href="/deliveries">Deliveries</a>
  <a href="/reports">Reports</a>
  <a href="/logout">Logout</a>
</div>

<div class="content">

  <h2 class="mb-4">System Users</h2>

  <div class="table-box">

    <table class="table table-bordered">
      <thead class="table-dark">
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Role</th>
      </tr>
      </thead>

      <tbody id="userTable"></tbody>
    </table>

  </div>

</div>

<script>

  function loadUsers(){
  fetch('/api/users')
  .then(res=>res.json())
  .then(data=>{

  let rows='';

  if(data.length === 0){
    rows = '<tr><td colspan="4" class="text-center">No users found</td></tr>';
  } else {
    data.forEach(u=>{
    rows+=`
    <tr>
    <td>${u.userId}</td>
    <td>${u.name}</td>
    <td>${u.email}</td>
    <td><span class="badge bg-info">${u.role}</span></td>
    </tr>`;
    });
  }

  document.getElementById("userTable").innerHTML=rows;

  });
  }

  loadUsers();

</script>

</body>
</html>
