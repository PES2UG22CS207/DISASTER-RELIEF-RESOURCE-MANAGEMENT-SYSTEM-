<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Resources</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link th:href="@{/style.css}" rel="stylesheet">
</head>
<body>

<div class="sidebar">
  <h4 class="text-center mb-4">Admin Panel</h4>
  <a href="/admin-dashboard">Dashboard</a>
  <a href="/users">Users</a>
  <a href="/camp-page">Camps</a>
  <a href="/requests">Requests</a>
  <a href="/resources" style="background-color: #007bff; color: white;">Resources</a>
  <a href="/warehouses">Warehouses</a>
  <a href="/inventory">Inventory</a>
  <a href="/deliveries">Deliveries</a>
  <a href="/reports">Reports</a>
  <a href="/logout">Logout</a>
</div>

<div class="content">

  <h2 class="mb-4">Available Resources</h2>

  <div class="table-box">

    <table class="table table-bordered">
      <thead class="table-dark">
      <tr>
        <th>Resource ID</th>
        <th>Resource Name</th>
        <th>Category</th>
        <th>Unit</th>
        <th>Expiry Date</th>
      </tr>
      </thead>

      <tbody id="resourceTable"></tbody>
    </table>

  </div>

</div>

<script>

  function loadResources(){
  fetch('/api/resources')
  .then(res=>res.json())
  .then(data=>{

  let rows='';

  if(data.length === 0){
    rows = '<tr><td colspan="5" class="text-center">No resources found</td></tr>';
  } else {
    data.forEach(r=>{
    rows+=`
    <tr>
    <td>${r.resourceId}</td>
    <td>${r.resourceName}</td>
    <td><span class="badge bg-secondary">${r.category}</span></td>
    <td>${r.unit}</td>
    <td>${r.expiryDate || 'N/A'}</td>
    </tr>`;
    });
  }

  document.getElementById("resourceTable").innerHTML=rows;

  })
  .catch(err => {
    document.getElementById("resourceTable").innerHTML = '<tr><td colspan="5" class="text-center text-danger">Error loading resources</td></tr>';
  });
  }

  loadResources();

</script>

</body>
</html>
