<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Login</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link th:href="@{/style.css}" rel="stylesheet">
</head>
<body>

<div class="login-box">

  <h2 class="text-center mb-4">Login</h2>

  <form th:action="@{/login}" method="post">

    <div class="mb-3">
      <label>Email</label>
      <input type="email" name="username" class="form-control" required>
    </div>

    <div class="mb-3">
      <label>Password</label>
      <input type="password" name="password" class="form-control" required>
    </div>

    <button type="submit" class="btn btn-primary w-100">Login</button>

  </form>

    <div class="text-center mt-3">
      <span>Don't have an account?</span>
      <button id="showRegister" class="btn btn-link p-0">Register</button>
    </div>

        <div id="msg" class="text-center mt-3 text-danger"
          th:if="${param.error}">Invalid email or password</div>
        <div class="text-center mt-3 text-success"
          th:if="${param.logout}">Logged out</div>

  </div>

  <div class="login-box" id="registerBox" style="display:none;">
    <h2 class="text-center mb-4">Register</h2>

    <form id="registerForm">
      <div class="mb-3">
        <label>Name</label>
        <input type="text" id="regName" class="form-control" required>
      </div>
      <div class="mb-3">
        <label>Email</label>
        <input type="email" id="regEmail" class="form-control" required>
      </div>
      <div class="mb-3">
        <label>Password</label>
        <input type="password" id="regPassword" class="form-control" required>
      </div>
      <div class="mb-3">
        <label>Role</label>
        <select id="regRole" class="form-control" required>
          <option value="ADMIN">Admin</option>
          <option value="CAMP_MANAGER">Camp Manager</option>
          <option value="WAREHOUSE_MANAGER">Warehouse Manager</option>
          <option value="LOGISTICS_OFFICER">Logistics Officer</option>
        </select>
      </div>
      <button type="submit" class="btn btn-success w-100">Register</button>
    </form>

    <div class="text-center mt-3">
      <span>Already registered?</span>
      <button id="showLogin" class="btn btn-link p-0">Login</button>
    </div>

    <div id="registerMsg" class="text-center mt-3 text-danger"></div>
  </div>

<script>
  document.getElementById('showRegister').addEventListener('click', function() {
      document.querySelector('.login-box').style.display = 'none';
      document.getElementById('registerBox').style.display = 'block';
      document.getElementById('msg').innerText = '';
  });

  document.getElementById('showLogin').addEventListener('click', function() {
      document.querySelector('.login-box').style.display = 'block';
      document.getElementById('registerBox').style.display = 'none';
      document.getElementById('registerMsg').innerText = '';
  });

  document.getElementById("registerForm").addEventListener("submit", function(e){
      e.preventDefault();

      const requestBody = {
          name: document.getElementById("regName").value,
          email: document.getElementById("regEmail").value,
          password: document.getElementById("regPassword").value,
          role: document.getElementById("regRole").value
      };

      fetch("/api/users/register", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify(requestBody)
      })
      .then(res => {
          if (!res.ok) {
              return res.text().then(text => { throw new Error(text); });
          }
          return res.json();
      })
      .then(data => {
          document.getElementById("registerMsg").className = "text-center mt-3 text-success";
          document.getElementById("registerMsg").innerText = "Registration successful. Please login.";
          setTimeout(() => {
              document.getElementById('showLogin').click();
          }, 1200);
      })
      .catch(err => {
          document.getElementById("registerMsg").className = "text-center mt-3 text-danger";
          document.getElementById("registerMsg").innerText = err.message;
      });
  });
</script>

</body>
</html>
