<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Manage Camps</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/style.css}" rel="stylesheet">
</head>
<body>

<div class="sidebar">
    <h4 class="text-center mb-4">Admin Panel</h4>
    <a href="/admin-dashboard">Dashboard</a>
    <a href="/users">Users</a>
    <a href="/camp-page" style="background-color: #007bff; color: white;">Camps</a>
    <a href="/requests">Requests</a>
    <a href="/resources">Resources</a>
    <a href="/warehouses">Warehouses</a>
    <a href="/inventory">Inventory</a>
    <a href="/deliveries">Deliveries</a>
    <a href="/reports">Reports</a>
    <a href="/logout">Logout</a>
</div>

<div class="content">

    <h2 class="mb-4">Relief Camps Overview</h2>

    <div class="table-box">
        <table class="table table-bordered">
            <thead class="table-dark">
            <tr>
                <th>Camp ID</th>
                <th>Name</th>
                <th>District</th>
                <th>State</th>
                <th>Population</th>
                <th>Severity Level</th>
                <th>Action</th>
            </tr>
            </thead>
            <tbody id="campTable"></tbody>
        </table>
    </div>

</div>

<script>

    function loadCamps(){
    fetch('/api/camps')
    .then(res=>res.json())
    .then(data=>{
    let rows='';
    if(data.length === 0){
        rows = '<tr><td colspan="6" class="text-center">No camps found</td></tr>';
    } else {
        data.forEach(c=>{
        rows+=`
        <tr>
        <td>${c.campId}</td>
        <td>${c.name}</td>
        <td>${c.district}</td>
        <td>${c.state}</td>
        <td>${c.population}</td>
        <td><span class="badge bg-warning text-dark">${c.severityLevel}</span></td>
        <td><button class='btn btn-danger btn-sm' onclick='deleteCamp(${c.campId})'>Delete</button></td>
        </tr>`;
        });
    }
    document.getElementById("campTable").innerHTML=rows;
    })
    .catch(err => {
        document.getElementById("campTable").innerHTML = '<tr><td colspan="6" class="text-center text-danger">Error loading camps</td></tr>';
    });
    }

    function deleteCamp(id) {
        if (!confirm('Delete this camp?')) return;
        fetch('/api/camps/' + id, {method: 'DELETE'})
            .then(res => {
                if (!res.ok) {
                    return res.text().then(text => { throw new Error(text); });
                }
                return res.text();
            })
            .then(() => {
                alert('Camp deleted successfully. Related camp managers and requests were removed.');
                loadCamps();
            })
            .catch(err => alert('Unable to delete camp: ' + err.message));
    }

    loadCamps();

</script>

</body>
</html>
