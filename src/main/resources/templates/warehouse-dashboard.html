<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Warehouse Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/style.css}" rel="stylesheet">
</head>
<body>

<div class="sidebar">
    <h4 class="text-center mb-4">Warehouse Panel</h4>

    <a href="/warehouse-dashboard">Dashboard</a>
    <a href="/warehouses">Warehouses</a>
    <a href="/inventory">Inventory</a>
    <a href="/logout">Logout</a>
</div>

<div class="content">

    <h2 class="mb-4">Warehouse Dashboard</h2>

    <div class="row g-4">

        <div class="col-md-6">
            <div class="card card-box p-4">
                <h5>Total Warehouses</h5>
                <h2 id="warehouseCount">0</h2>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card card-box p-4">
                <h5>Total Inventory Items</h5>
                <h2 id="inventoryCount">0</h2>
            </div>
        </div>

    </div>

    <div class="table-box mt-4">
        <h4>Low Stock Alerts (Qty &lt; 10)</h4>
        <div class="table-responsive">
            <table class="table table-bordered mb-0">
                <thead class="table-dark">
                <tr>
                    <th>Resource</th>
                    <th>Category</th>
                    <th>Quantity</th>
                </tr>
                </thead>
                <tbody id="warehouseLowStockTable"></tbody>
            </table>
        </div>
        <div id="warehouseLowStockMsg" class="text-muted mt-2"></div>
    </div>

</div>

<script>
    fetch('/api/warehouses')
        .then(res=>res.json())
        .then(data=>{
            document.getElementById("warehouseCount").innerText=data.length;
        });

    fetch('/api/inventory')
        .then(res=>res.json())
        .then(data=>{
            document.getElementById("inventoryCount").innerText=data.length;
        });

    function loadMyWarehouseLowStock() {
        fetch('/api/auth/current-user')
            .then(res => res.json())
            .then(user => {
                if (!user || user.role !== 'WAREHOUSE_MANAGER' || !user.warehouseId) {
                    document.getElementById('warehouseLowStockMsg').innerText = 'Link your account to a warehouse to see low stock alerts.';
                    document.getElementById('warehouseLowStockTable').innerHTML = '<tr><td colspan="3" class="text-center">No data</td></tr>';
                    return;
                }

                return fetch('/api/inventory/warehouse/' + user.warehouseId)
                    .then(r => r.json())
                    .then(items => {
                        const low = (items || []).filter(i => i && typeof i.quantity === 'number' && i.quantity < 10);
                        if (low.length === 0) {
                            document.getElementById('warehouseLowStockMsg').innerText = 'No low stock items.';
                            document.getElementById('warehouseLowStockTable').innerHTML = '<tr><td colspan="3" class="text-center">No low stock items</td></tr>';
                            return;
                        }

                        document.getElementById('warehouseLowStockMsg').innerText = '';
                        const rows = low.map(i => {
                            const resource = i.resource ? i.resource.resourceName : '-';
                            const category = i.resource ? i.resource.category : '-';
                            return `
                                <tr>
                                    <td>${resource}</td>
                                    <td>${category}</td>
                                    <td><span class="badge bg-danger">${i.quantity}</span></td>
                                </tr>
                            `;
                        }).join('');
                        document.getElementById('warehouseLowStockTable').innerHTML = rows;
                    });
            })
            .catch(() => {
                document.getElementById('warehouseLowStockMsg').innerText = 'Error loading low stock alerts.';
                document.getElementById('warehouseLowStockTable').innerHTML = '<tr><td colspan="3" class="text-center text-danger">Error</td></tr>';
            });
    }

    loadMyWarehouseLowStock();
</script>

</body>
</html>
