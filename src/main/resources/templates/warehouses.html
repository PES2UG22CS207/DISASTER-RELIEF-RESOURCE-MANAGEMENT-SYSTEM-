<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Warehouses</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/style.css}" rel="stylesheet">
</head>
<body>

<div class="sidebar" id="sidebarNav"></div>

<div class="content">

    <h2 class="mb-4">Manage Warehouses</h2>

    <div id="warehouseForm" class="card card-box p-4 mb-4">
        <div class="row g-3 align-items-end">
            <div class="col-md-3">
                <input type="text" id="name" class="form-control" placeholder="Warehouse Name">
            </div>
            <div class="col-md-3">
                <input type="text" id="district" class="form-control" placeholder="District">
            </div>
            <div class="col-md-3">
                <input type="text" id="state" class="form-control" placeholder="State">
            </div>
            <div class="col-md-2">
                <input type="number" id="capacity" class="form-control" placeholder="Capacity">
            </div>
            <div class="col-md-1">
                <button class="btn btn-primary w-100" onclick="addWarehouse()">Add</button>
            </div>
        </div>
    </div>

    <div class="table-box">
        <table class="table table-bordered">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>District</th>
                <th>State</th>
                <th>Capacity</th>
                <th>Action</th>
            </tr>
            </thead>
            <tbody id="warehouseTable"></tbody>
        </table>
    </div>

</div>

<script>
    let currentUser = null;
    let canManageWarehouses = false;
    let isAdmin = false;

    function buildSidebar(role) {
        if (role === 'ADMIN') {
            return `
                <h4 class="text-center mb-4">Admin Panel</h4>
                <a href="/admin-dashboard">Dashboard</a>
                <a href="/users">Users</a>
                <a href="/camp-page">Camps</a>
                <a href="/requests">Requests</a>
                <a href="/resources">Resources</a>
                <a href="/warehouses" style="background-color: #007bff; color: white;">Warehouses</a>
                <a href="/inventory">Inventory</a>
                <a href="/deliveries">Deliveries</a>
                <a href="/reports">Reports</a>
                <a href="/logout">Logout</a>
            `;
        }

        return `
            <h4 class="text-center mb-4">Warehouse Panel</h4>
            <a href="/warehouse-dashboard">Dashboard</a>
            <a href="/warehouses" style="background-color: #007bff; color: white;">My Warehouse</a>
            <a href="/inventory">Inventory</a>
            <a href="/logout">Logout</a>
        `;
    }

    function loadWarehouses(){
        const endpoint = (currentUser && currentUser.role === 'WAREHOUSE_MANAGER') ? '/api/warehouses/my' : '/api/warehouses';

        fetch(endpoint)
            .then(res=>res.json())
            .then(data=>{
                let rows='';

                const warehouses = Array.isArray(data) ? data : (data ? [data] : []);
                if (warehouses.length === 0) {
                    rows = '<tr><td colspan="6" class="text-center">No warehouse found</td></tr>';
                } else {
                    warehouses.forEach(w=>{
                        rows+=`
                            <tr>
                                <td>${w.warehouseId}</td>
                                <td>${w.warehouseName}</td>
                                <td>${w.district}</td>
                                <td>${w.state}</td>
                                <td>${w.capacity}</td>
                                <td>${(isAdmin) ? `<button class='btn btn-danger btn-sm' onclick='deleteWarehouse(${w.warehouseId})'>Delete</button>` : 'Owned'}</td>
                            </tr>`;
                    });
                }
                document.getElementById("warehouseTable").innerHTML=rows;
            })
            .catch(() => {
                document.getElementById("warehouseTable").innerHTML='<tr><td colspan="6" class="text-center text-danger">Error loading warehouses</td></tr>';
            });
    }

    function addWarehouse(){
        if (!canManageWarehouses) {
            alert('Only warehouse managers can create warehouses.');
            return;
        }

        const warehouseName = document.getElementById("name").value.trim();
        const district = document.getElementById("district").value.trim();
        const state = document.getElementById("state").value.trim();
        const capacity = parseInt(document.getElementById("capacity").value);

        if (!warehouseName || !district || !state || !capacity || capacity <= 0) {
            alert('Please fill all fields with valid values');
            return;
        }

        fetch('/api/warehouses/my',{ 
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({
                warehouseName: warehouseName,
                district: district,
                state: state,
                capacity: capacity
            })
        }).then(res => {
            if (!res.ok) {
                return res.text().then(text => { throw new Error(text); });
            }
            return res.json();
        })
        .then(warehouse => {
            alert('Warehouse added successfully!');
            // Clear form fields
            document.getElementById("name").value = '';
            document.getElementById("district").value = '';
            document.getElementById("state").value = '';
            document.getElementById("capacity").value = '';
            loadWarehouses();
        })
        .catch(err => {
            alert('Unable to add warehouse: ' + err.message);
            console.error('Warehouse error:', err);
        });
    }

    function deleteWarehouse(id){
        if (!canManageWarehouses && !isAdmin) {
            return;
        }
        fetch('/api/warehouses/'+id,{method:'DELETE'})
            .then(res => {
                if (!res.ok) {
                    return res.text().then(text => { throw new Error(text); });
                }
                return res.text();
            })
            .then(() => {
                alert('Warehouse deleted successfully!');
                loadWarehouses();
            })
            .catch(err => alert('Unable to delete warehouse: ' + err.message));
    }

    fetch('/api/auth/current-user')
        .then(res => res.json())
        .then(user => {
            currentUser = user;
            if (user && user.role) {
                document.getElementById('sidebarNav').innerHTML = buildSidebar(user.role);
            }

            if (user && user.role === 'WAREHOUSE_MANAGER') {
                canManageWarehouses = true;
            } else {
                document.getElementById('warehouseForm').style.display = 'none';
            }
            if (user && user.role === 'ADMIN') {
                isAdmin = true;
                document.getElementById('warehouseForm').style.display = 'none';
            }

            loadWarehouses();
        })
        .catch(() => {
            document.getElementById('warehouseForm').style.display = 'none';
            loadWarehouses();
        });
</script>

</body>
</html>
